server {
    listen 80;
    server_name localhost;

    set $guac_user "";

    # -------------------------------------------------
    # Backend API — browser calls /api/*, nginx forwards to backend container
    # -------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000/;   # trailing slash strips /api prefix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------
    # Guacamole — token endpoint with SSO auth
    # -------------------------------------------------
    location = /guacamole/api/tokens {
        auth_request /_auth_guacamole;
        auth_request_set $guac_user $upstream_http_x_remote_user;
        proxy_pass http://guacamole:8080/guacamole/api/tokens;
        proxy_set_header X-Remote-User $guac_user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other Guacamole traffic
    location /guacamole/ {
        proxy_pass http://guacamole:8080/guacamole/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # -------------------------------------------------
    # Internal: JWT validation endpoint
    # -------------------------------------------------
    location = /_auth_guacamole {
        internal;

        # Extract access_token from cookie and pass as Bearer header
        set $token "";
        if ($http_cookie ~* "access_token=([^;]+)(?:;|$)") {
            set $token $1;
        }

        proxy_pass http://backend:8000/auth/guacamole-sso;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization "Bearer $token";
    }

    # -------------------------------------------------
    # Frontend React SPA (catch-all, must be LAST)
    # -------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;
}