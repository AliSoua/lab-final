# docker-compose.prod.yml
version: '3.3'

services:
  # -------------------------------------------------------------------------
  # Core Platform
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: database-lab
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c checkpoint_timeout=10min
      -c checkpoint_completion_target=0.9
    ports:
      - "5432:5432"
    volumes:
      - pgdata_lab_platform_test:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev
    restart: always
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_CACHE: local
      KC_METRICS_ENABLED: "false"
      KC_HEALTH_ENABLED: "false"
      JAVA_OPTS_KC_HEAP: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=30"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: always
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - vault_data:/vault/file
      - ./vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - ./vault/init-vault.sh:/vault/init-vault.sh:ro
    entrypoint: ["/bin/sh"]
    command: ["/vault/init-vault.sh"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: fastapi-backend
    restart: always
    depends_on:
      - db
      - vault
      - keycloak
      - guac-db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/app/scripts:/app/app/scripts
    command: ["/bin/sh", "/app/app/scripts/start_with_keycloak.sh"]
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - GUACAMOLE_API_URL=http://guacamole:8080/guacamole/api
      - GUACAMOLE_ADMIN_USER=guacadmin
      - GUACAMOLE_ADMIN_PASS=${GUACAMOLE_ADMIN_PASS:-guacadmin}
      # Guacamole SSO config (used by setup_keycloak.py)
      - GUACAMOLE_CLIENT_ID=guacamole
      - GUACAMOLE_PUBLIC_URL=http://localhost:8081/guacamole

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: react-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

  # -------------------------------------------------------------------------
  # Guacamole Stack (isolated database)
  # -------------------------------------------------------------------------
  guac-db:
    image: postgres:15-alpine
    container_name: guac-db
    restart: always
    environment:
      POSTGRES_USER: ${GUACAMOLE_DB_USER}
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASS}
      POSTGRES_DB: ${GUACAMOLE_DB}
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=20
    volumes:
      - guac-data:/var/lib/postgresql/data
      - ./guacamole/001-create-schema.sql:/docker-entrypoint-initdb.d/001-create-schema.sql:ro
      - ./guacamole/002-create-admin-user.sql:/docker-entrypoint-initdb.d/002-create-admin-user.sql:ro
    networks:
      - default

  guacd:
    image: guacamole/guacd:1.5.5
    container_name: guacd
    restart: always
    networks:
      - default

  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: guacamole-web
    restart: always
    depends_on:
      - guac-db
      - guacd
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: guac-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${GUACAMOLE_DB}
      POSTGRESQL_USER: ${GUACAMOLE_DB_USER}
      POSTGRESQL_PASSWORD: ${GUACAMOLE_DB_PASS}

      # --- OpenID Connect SSO (Keycloak) ---
      # Browser-facing URL (user is redirected here)
      OPENID_AUTHORIZATION_ENDPOINT: http://localhost:8080/realms/lab-orchestration/protocol/openid-connect/auth
      # Internal Docker DNS for JWKS (Guacamole container fetches keys here)
      OPENID_JWKS_ENDPOINT: http://keycloak:8080/realms/lab-orchestration/protocol/openid-connect/certs
      # Must match the 'iss' claim in the token
      OPENID_ISSUER: http://localhost:8080/realms/lab-orchestration
      OPENID_CLIENT_ID: guacamole
      OPENID_REDIRECT_URI: http://localhost:8081/guacamole/
      OPENID_USERNAME_CLAIM_TYPE: preferred_username
      OPENID_SCOPE: openid email profile
      OPENID_LOGOUT_ENDPOINT: http://keycloak:8080/realms/lab-orchestration/protocol/openid-connect/logout

      # Auto-create Guacamole users on first Keycloak login
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "true"

      # Force OpenID first. Use "*,openid" instead if you still need local guacadmin login.
      EXTENSION_PRIORITY: openid
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      # Mount the SSO extension JAR
      - ./guacamole/extensions:/etc/guacamole/extensions
    networks:
      - default

volumes:
  pgdata_lab_platform_test:
  keycloak_data:
  guac-data:
  vault_data: