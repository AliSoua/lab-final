version: '3.3'
services:
  db:
    image: postgres:15-alpine
    container_name: database-lab
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_lab_platform:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev
    restart: always
    mem_limit: 512m
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_CACHE: local
      KC_METRICS_ENABLED: "false"
      KC_HEALTH_ENABLED: "false"
      JAVA_OPTS_KC_HEAP: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=30"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: always
    ports:
      - "127.0.0.1:8200:8200"
    entrypoint: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: >
      server -dev
      -dev-root-token-id=root
      -dev-listen-address=0.0.0.0:8200

  backend:
    build:
      context: ./backend
    container_name: fastapi-backend
    restart: always
    depends_on:
      - db
      - vault
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # HARD-CODE the Docker-internal URL here
      - VAULT_ADDR=http://vault:8200
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata_lab_platform:
  keycloak_data:  # Add this volume